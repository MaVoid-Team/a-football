# Nginx config for a-football.mavoid.com
# Place in /etc/nginx/sites-available/ and symlink into sites-enabled

upstream a_football_app {
    server 127.0.0.1:3094;
    keepalive 16;
}

upstream a_football_frontend {
    server 127.0.0.1:3095;
    keepalive 16;
}

server {
    listen 80;
    server_name a-football.mavoid.com;

    client_max_body_size 50M;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # Rails API
    location /api/ {
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
        proxy_pass http://a_football_app;
    }

    # Next.js frontend
    location / {
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
        proxy_pass http://a_football_frontend;
    }

    location = /up {
        access_log off;
        proxy_pass http://a_football_app;
    }
}